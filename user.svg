<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#0a0e1a"/><stop offset="50%" stop-color="#1a1040"/><stop offset="100%" stop-color="#0d1117"/>
</linearGradient>
<filter id="gC" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="gS" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="6"/></filter>
<linearGradient id="bdr" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/><stop offset="40%" stop-color="#a855f7" stop-opacity="0.3"/>
<stop offset="70%" stop-color="#00d4ff" stop-opacity="0.1"/><stop offset="100%" stop-color="#a855f7" stop-opacity="0.5"/>
</linearGradient>
<linearGradient id="skR"><stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#0ea5e9"/></linearGradient>
<linearGradient id="skT"><stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
<linearGradient id="skE"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
<linearGradient id="skU"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#ea580c"/></linearGradient>
