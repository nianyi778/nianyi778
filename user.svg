@keyframes fl1{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes fl2{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
.cursor{animation:cursor 1s step-end infinite}
.pulse{animation:pulse 2.5s ease-in-out infinite}
.breathe{animation:breathe 4s ease-in-out infinite}
.f1{animation:fl1 6s ease-in-out infinite}
.f2{animation:fl2 5s ease-in-out infinite}
.m{font-family:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace}
.s{font-family:'Segoe UI','SF Pro Display',-apple-system,'Helvetica Neue',sans-serif}
</style>

