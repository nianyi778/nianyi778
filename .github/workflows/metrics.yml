name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg

          template: classic
          config_animations: yes
          config_display: large

          user: nianyi778
          config_timezone: Asia/Tokyo
          base: header, activity, community, repositories, metadata

          # Languages (disable indepth to avoid token permission issues)
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_colors: github
          plugin_languages_indepth: no

          # Coding habits (simplified - no charts to reduce API calls)
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: no

          # Isometric calendar (3D contribution graph)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Achievements (raised threshold to reduce API calls)
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: B

          # Recent activity (reduced scope)
          plugin_activity: yes
          plugin_activity_limit: 4
          plugin_activity_days: 7
          plugin_activity_filter: all
          plugin_activity_visibility: public